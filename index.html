<!DOCTYPE html>
<html>
<head>
    
<button onclick="startNexora()">Start NEXORA AI</button>

<div id="output"></div>
    <style>

        body{
            background-color:#0B1F3A;
            color:white;
            text-align:center;
            font-family:Arial;
        }

        h1{
            color:#7B2CBF;
        }

        button{
            background:#7B2CBF;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:18px;
        }

    </style>

</head>

<body>

<h1>NEXORA AI</h1>

<h2>Na samu mafita. Na samu malami.</h2>

<p>Founder: Yahaya Bello</p>

<p>Country: Nigeria</p>

<p>Mission: To help people learn, solve problems, and build skills.</p>

<button onclick="startNexora()">Start NEXORA AI</button>

<script>
function startNexora() {

    let name = prompt("Menene sunanka?");
    let goal = prompt("Menene burinka?");

    document.getElementById("output").innerHTML = `
        <h2>Assalamu Alaikum, ${name}.</h2>

        <p><strong>Burinka:</strong> ${goal}</p>

        <p>NEXORA AI za ta taimaka maka ka cimma burinka.</p>

        <h3>Na samu mafita.<br>Na samu malami.</h3>
    `;
}

</script>

</body>
</html>
