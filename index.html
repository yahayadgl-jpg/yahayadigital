<!DOCTYPE html>
<html>
<head>
<title>NEXORA AI</title>

<style>

body{
    background:#0B1F3A;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
}

h1{
    color:#7B2CBF;
}

input{
    width:80%;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:18px;
    margin-top:20px;
}

button{
    background:#7B2CBF;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background:#5A189A;
}

#chat{
    margin-top:30px;
    text-align:left;
    background:#13294B;
    padding:20px;
    border-radius:10px;
}

.user{
    color:#87CEFA;
}

.ai{
    color:#FFD700;
}

</style>

</head>

<body>

<h1>NEXORA AI</h1>


<input
type="text"
id="message"
placeholder="Rubuta sakonka...">

<br>

<button onclick="sendMessage()">Send</button>

<div id="chat">

<p><b>NEXORA AI:</b> Assalamu Alaikum. Barka da zuwa.</p>

</div>

<script>

function sendMessage(){

let message=document.getElementById("message").value;

document.getElementById("chat").innerHTML+=`

<p class="user"><b>Kai:</b> ${message}</p>

<p class="ai"><b>NEXORA AI:</b>
Na karɓi saƙonka.

Na samu mafita.
Na samu malami.
</p>

`;

document.getElementById("message").value="";

}

</script>

</body>
</html>
